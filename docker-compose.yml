services:
  qbitx-proxy:
    build: .
    container_name: qbitx-rpc-proxy
    restart: unless-stopped
    ports:
      - "${PROXY_PORT:-8080}:8080"
    environment:
      - QBITX_NODE_HOST=${QBITX_NODE_HOST:-host.docker.internal}
      - QBITX_NODE_PORT=${QBITX_NODE_PORT:-8332}
      - QBITX_NODE_USER=${QBITX_NODE_USER:-qbitx}
      - QBITX_NODE_PASS=${QBITX_NODE_PASS:?Set QBITX_NODE_PASS in .env}
    extra_hosts:
      - "host.docker.internal:host-gateway"
