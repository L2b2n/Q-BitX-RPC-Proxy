events {
    worker_connections 1024;
}

http {
    # Rate limiting (zusätzlich zum App-Level Limiter)
    limit_req_zone $binary_remote_addr zone=rpc:10m rate=30r/s;

    # Logging
    log_format proxy '$remote_addr - [$time_local] "$request" $status '
                     '$body_bytes_sent "$http_user_agent"';
    access_log /var/log/nginx/access.log proxy;

    # --- HTTP: Redirect to HTTPS + ACME challenge ---
    server {
        listen 80;
        server_name rpc.qbitx.org;

        # Let's Encrypt challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Alles andere -> HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # --- HTTPS: Proxy to Q-BitX RPC ---
    server {
        listen 443 ssl;
        server_name rpc.qbitx.org;

        # SSL certs (Let's Encrypt)
        ssl_certificate     /etc/letsencrypt/live/rpc.qbitx.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/rpc.qbitx.org/privkey.pem;

        # Modern TLS only
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;

        # Max request body (raw transactions können groß sein)
        client_max_body_size 1m;

        # RPC endpoint
        location / {
            limit_req zone=rpc burst=20 nodelay;

            proxy_pass http://qbitx-proxy:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # CORS für Web-Wallets
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "POST, GET, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type" always;

            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # Health check (kein Rate Limit)
        location /health {
            proxy_pass http://qbitx-proxy:8080/;
        }
    }
}
